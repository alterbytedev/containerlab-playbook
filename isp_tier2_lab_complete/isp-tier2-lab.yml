name: isp-core-lab

mgmt:
  network: clab-mgmt
  ipv4-subnet: 192.168.10.0/24

topology:
  nodes:
    # ===== UPSTREAM TIER 1 (External Transit) =====
    tier1-a: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.101
      labels: { as: "1000" }
      startup-config: configs/tier1-a.cfg

    tier1-b: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.102
      labels: { as: "1000" }
      startup-config: configs/tier1-b.cfg

    # ===== CORE P ROUTERS (AS 65000) =====
    p1: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.11
      labels: { as: "65000" }
      startup-config: configs/p1.cfg

    p2: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.12
      labels: { as: "65000" }
      startup-config: configs/p2.cfg

    # ===== ROUTE REFLECTORS (AS 65000) =====
    rr1: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.21
      labels: { as: "65000" }
      startup-config: configs/rr1.cfg

    rr2: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.22
      labels: { as: "65000" }
      startup-config: configs/rr2.cfg

    # ===== PROVIDER EDGE (PE - AS 65000) =====
    pe1: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.31
      labels: { as: "65000" }
      startup-config: configs/pe1.cfg

    pe2: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.32
      labels: { as: "65000" }
      startup-config: configs/pe2.cfg

    # ===== CUSTOMER EDGE (CE) =====
    ce1: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.41
      labels: { as: "65100" }
      startup-config: configs/ce1.cfg

    ce2: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.42
      labels: { as: "65200" }
      startup-config: configs/ce2.cfg

    # ===== LOCAL EXCHANGE (IIX Members) =====
    iix-sw: { kind: ceos, image: ceos:4.36.0F, mgmt-ipv4: 192.168.10.50 }
    
    as-member1: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.51
      labels: { as: "11111" }
      startup-config: configs/as1.cfg

    as-member2: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.52
      labels: { as: "22222" }
      startup-config: configs/as2.cfg

    as-member3: 
      kind: ceos
      image: ceos:4.36.0F
      mgmt-ipv4: 192.168.10.53
      labels: { as: "33333" }
      startup-config: configs/as3.cfg

  links:
  # ===== TRANSIT (FIXED: NOW TO PE) =====
  - endpoints: ["tier1-a:eth1", "pe1:eth5"]
  - endpoints: ["tier1-b:eth1", "pe2:eth5"]

  # ===== CORE =====
  - endpoints: ["p1:eth2", "p2:eth2"]
  - endpoints: ["p1:eth3", "rr1:eth1"]
  - endpoints: ["p2:eth3", "rr2:eth1"]
  - endpoints: ["rr1:eth2", "rr2:eth2"]

  # ===== PE <-> CORE =====
  - endpoints: ["p1:eth4", "pe1:eth1"]
  - endpoints: ["p2:eth4", "pe2:eth1"]

  # ===== PE INTERCONNECT =====
  - endpoints: ["pe1:eth2", "pe2:eth2"]

  # ===== CUSTOMER =====
  - endpoints: ["pe1:eth3", "ce1:eth1"]
  - endpoints: ["pe2:eth3", "ce2:eth1"]

  # ===== IIX =====
  - endpoints: ["pe1:eth4", "iix-sw:eth1"]
  - endpoints: ["as-member1:eth1", "iix-sw:eth2"]
  - endpoints: ["as-member2:eth1", "iix-sw:eth3"]
  - endpoints: ["as-member3:eth1", "iix-sw:eth4"]
